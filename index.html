<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Fuel the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #f59e0b;
            --accent: #8b5cf6;
            --danger: #ef4444;
            --bg-dark: #0f0f1a;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        #three-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6rem 2rem 4rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--primary);
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(16, 185, 129, 0.5);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--primary);
        }

        .stats {
            display: flex;
            gap: 3rem;
            margin-top: 4rem;
            animation: fadeInUp 0.6s ease 0.8s both;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .section {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .section-header p {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .card-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .card-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--secondary); }
        .card-icon.purple { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
        .card-icon.red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .card-icon svg {
            width: 28px;
            height: 28px;
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .assessment-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .assessment-form {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .radio-option {
            padding: 0.75rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .radio-option:hover {
            border-color: var(--primary);
        }

        .radio-option.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
        }

        .result-container {
            margin-top: 2rem;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .risk-level {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .risk-low { color: var(--primary); }
        .risk-moderate { color: var(--secondary); }
        .risk-high { color: var(--danger); }

        .progress-ring {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 12;
        }

        .progress-bg {
            stroke: var(--bg-card);
        }

        .progress-fill {
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .risk-factors {
            margin-top: 1.5rem;
        }

        .risk-factor {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .risk-factor:last-child {
            border-bottom: none;
        }

        .factor-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .factor-icon.positive { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .factor-icon.negative { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .recommendations {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .recommendations h4 {
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .recommendations ul {
            list-style: none;
        }

        .recommendations li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
        }

        .recommendations li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .map-container {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            height: 500px;
            position: relative;
        }

        .map-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .map-placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .map-markers {
            position: absolute;
            top: 1rem;
            left: 1rem;
            right: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            z-index: 10;
        }

        .map-marker {
            padding: 0.5rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .map-marker:hover,
        .map-marker.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
        }

        .location-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            gap: 1rem;
            transition: all 0.3s;
        }

        .location-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .location-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .location-icon.bank { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .location-icon.market { background: rgba(245, 158, 11, 0.2); color: var(--secondary); }
        .location-icon.kitchen { background: rgba(139, 92, 246, 0.2); color: var(--accent); }

        .location-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .location-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .location-distance {
            font-size: 0.75rem;
            color: var(--primary);
            margin-top: 0.25rem;
        }

        .meals-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .meal-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .meal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .meal-image {
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .meal-image::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        .meal-image svg {
            width: 64px;
            height: 64px;
            opacity: 0.9;
        }

        .meal-content {
            padding: 1.5rem;
        }

        .meal-tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .meal-tag {
            padding: 0.25rem 0.75rem;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .meal-tag.protein { color: var(--danger); }
        .meal-tag.vitamins { color: var(--primary); }
        .meal-tag.budget { color: var(--secondary); }

        .meal-content h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .meal-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .meal-macros {
            display: flex;
            gap: 1rem;
        }

        .macro {
            text-align: center;
        }

        .macro-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--primary);
        }

        .macro-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .exchange-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .exchange-form {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .exchange-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .exchange-item:hover {
            border-color: var(--primary);
        }

        .exchange-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .exchange-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .exchange-details h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .exchange-details p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .exchange-distance {
            font-size: 0.85rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .contact-btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .contact-btn:hover {
            background: var(--primary-dark);
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .glow {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .stats {
                flex-direction: column;
                gap: 1.5rem;
            }

            .assessment-form {
                padding: 1.5rem;
            }
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recipe-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .recipe-content {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .recipe-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .recipe-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .recipe-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .close-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .recipe-body {
            padding: 2rem;
        }

        .recipe-section {
            margin-bottom: 1.5rem;
        }

        .recipe-section h3 {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .recipe-section ul {
            list-style: none;
        }

        .recipe-section li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .recipe-section li:last-child {
            border-bottom: none;
        }

        .recipe-section li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .recipe-steps {
            counter-reset: step;
        }

        .recipe-steps li {
            padding-left: 2.5rem;
        }

        .recipe-steps li::before {
            content: counter(step);
            counter-increment: step;
            position: absolute;
            left: 0;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .recipe-meta {
            display: flex;

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const threeScript = document.createElement('script');
        threeScript.innerHTML = `
            (function() {
                const container = document.getElementById('three-bg');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                const geometry = new THREE.TorusKnotGeometry(2, 0.5, 128, 32);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x10b981,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const torusKnot = new THREE.Mesh(geometry, material);
                scene.add(torusKnot);

                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 2000;
                const posArray = new Float32Array(particlesCount * 3);
                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 20;
                }
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0xf59e0b,
                    transparent: true,
                    opacity: 0.8
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                camera.position.z = 6;

                let mouseX = 0;
                let mouseY = 0;
                document.addEventListener('mousemove', (e) => {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                });

                function animate() {
                    requestAnimationFrame(animate);
                    torusKnot.rotation.x += 0.002;
                    torusKnot.rotation.y += 0.003;
                    particlesMesh.rotation.y += 0.0005;
                    
                    camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
                    camera.position.y += (mouseY * 0.5 - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                    
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            })();
        `;
        document.body.appendChild(threeScript);

        function Assessment() {
            const [formData, setFormData] = useState({
                age: '',
                gender: '',
                household: '',
                income: '',
                symptoms: [],
                diet: '',
                access: '',
                concerns: ''
            });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const symptoms = [
                'Fatigue', 'Weight Loss', 'Hair Loss', 'Poor Wound Healing',
                'Frequent Illness', 'Dizziness', 'Muscle Weakness', 'Poor Appetite'
            ];

            const handleSymptomToggle = (symptom) => {
                setFormData(prev => ({
                    ...prev,
                    symptoms: prev.symptoms.includes(symptom)
                        ? prev.symptoms.filter(s => s !== symptom)
                        : [...prev.symptoms, symptom]
                }));
            };

            const calculateRisk = () => {
                setLoading(true);
                setTimeout(() => {
                    let score = 0;
                    
                    if (formData.income === 'low') score += 30;
                    else if (formData.income === 'medium') score += 15;
                    
                    if (formData.access === 'limited') score += 25;
                    else if (formData.access === 'some') score += 10;
                    
                    score += formData.symptoms.length * 5;
                    
                    if (formData.diet === 'poor') score += 20;
                    else if (formData.diet === 'fair') score += 10;
                    
                    if (parseInt(formData.household) > 4) score += 10;
                    
                    score = Math.min(100, score);
                    
                    let level, className, recommendations;
                    if (score < 30) {
                        level = 'Low Risk';
                        className = 'risk-low';
                        recommendations = [
                            'Maintain a balanced diet with variety of foods',
                            'Continue regular meals and hydration',
                            'Consider a daily multivitamin during winter months'
                        ];
                    } else if (score < 60) {
                        level = 'Moderate Risk';
                        className = 'risk-moderate';
                        recommendations = [
                            'Increase protein intake with beans, eggs, and lean meats',
                            'Add more fruits and vegetables to each meal',
                            'Visit a local food bank for supplementary support',
                            'Consider meeting with a nutrition counselor'
                        ];
                    } else {
                        level = 'High Risk';
                        className = 'risk-high';
                        recommendations = [
                            'Urgent: Connect with local food assistance programs',
                            'Schedule a health checkup with a primary care provider',
                            'Prioritize protein and calorie-dense foods',
                            'Reach out to community nutrition programs immediately'
                        ];
                    }

                    setResult({
                        score,
                        level,
                        className,
                        recommendations,
                        factors: [
                            { type: formData.income === 'low' ? 'negative' : 'positive', text: `Income level: ${formData.income || 'Not specified'}` },
                            { type: formData.access === 'limited' ? 'negative' : 'positive', text: `Food access: ${formData.access || 'Not specified'}` },
                            { type: formData.symptoms.length > 3 ? 'negative' : 'positive', text: `${formData.symptoms.length} nutritional symptoms reported` },
                            { type: formData.diet === 'poor' ? 'negative' : 'positive', text: `Diet quality: ${formData.diet || 'Not specified'}` }
                        ]
                    });
                    setLoading(false);
                }, 2000);
            };

            const circumference = 2 * Math.PI * 80;
            const offset = circumference - (result?.score / 100) * circumference;

            return (
                <section className="section" id="assessment">

                                </div>

                                                {g}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Household Size</label>
                                    <select value={formData.household} onChange={(e) => setFormData({...formData, household: e.target.value})}>

                                        <option value="1">1 person</option>
                                        <option value="2">2-3 people</option>
                                        <option value="4">4-5 people</option>

                            <div className="form-section">
                                <h3>Economic Factors</h3>
                                <div className="form-group">
                                    <label>Monthly Food Budget</label>
                                    <select value={formData.income} onChange={(e) => setFormData({...formData, income: e.target.value})}>

                                        <option value="low">Under $200</option>
                                        <option value="medium">$200 - $500</option>
                                        <option value="high">$500+</option>
                                    </select>
                                </div>
                            </div>

                            <div className="form-section">
                                <h3>Health Symptoms</h3>
                                <p style={{color: 'var(--text-secondary)', marginBottom: '1rem', fontSize: '0.9rem'}}>Select any symptoms you or your family have experienced recently</p>
                                <div className="radio-group">
                                    {symptoms.map(symptom => (
                                        <div key={symptom} className={`radio-option ${formData.symptoms.includes(symptom) ? 'selected' : ''}`} onClick={() => handleSymptomToggle(symptom)}>
                                            {symptom}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="form-section">
                                <h3>Diet & Access</h3>
                                <div className="form-group">
                                    <label>Diet Quality (past week)</label>
                                    <div className="radio-group">
                                        {['Excellent', 'Good', 'Fair', 'Poor'].map(d => (
                                            <div key={d} className={`radio-option ${formData.diet === d.toLowerCase() ? 'selected' : ''}`} onClick={() => setFormData({...formData, diet: d.toLowerCase()})}>
                                                {d}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group">
                                    <label>Access to Fresh Food</label>
                                    <select value={formData.access} onChange={(e) => setFormData({...formData, access: e.target.value})}>
                                        <option value="">Select</option>
                                        <option value="easy">Easy - within 1 mile</option>
                                        <option value="some">Moderate - 1-5 miles</option>
                                        <option value="limited">Limited - 5+ miles or difficult</option>
                                    </select>
                                </div>
                            </div>

                            <button className="btn btn-primary submit-btn" onClick={calculateRisk} disabled={loading}>
                                {loading ? 'Analyzing...' : 'Get My Risk Assessment'}
                            </button>

                            {loading && (
                                <div className="loader">
                                    <div className="spinner"></div>
                                </div>
                            )}
                        </div>

                        {result && !loading && (
                            <div className="result-container">
                                <div className={`risk-level ${result.className}`}>{result.level}</div>
                                <div className="progress-ring">
                                    <svg width="200" height="200">
                                        <circle className="progress-bg" cx="100" cy="100" r="80"/>
                                        <circle className="progress-fill" cx="100" cy="100" r="80" 
                                            stroke={result.score < 30 ? '#10b981' : result.score < 60 ? '#f59e0b' : '#ef4444'}
                                            strokeDasharray={circumference}
                                            strokeDashoffset={offset}
                                        />
                                    </svg>
                                </div>
                                <p style={{textAlign: 'center', color: 'var(--text-secondary)'}}>
                                    Risk Score: <strong style={{color: 'white'}}>{result.score}/100</strong>
                                </p>

                                <div className="risk-factors">
                                    <h4 style={{marginBottom: '1rem'}}>Contributing Factors</h4>

                                                ) : (
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                                )}

                                        </div>
                                    ))}

                                    <ul>
                                        {result.recommendations.map((rec, i) => (
                                            <li key={i}>{rec}</li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        )}

        function Resources() {
            const [activeFilter, setActiveFilter] = useState('all');
            const [showAll, setShowAll] = useState(false);
            const [userLocation, setUserLocation] = useState(null);
            const [loading, setLoading] = useState(true);
            const [locations, setLocations] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            setUserLocation({
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            });
                        },
                        (err) => {
                            setUserLocation({ lat: 40.7128, lng: -74.0060 });
                            setLoading(false);
                        }
                    );
                } else {
                    setUserLocation({ lat: 40.7128, lng: -74.0060 });
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                if (userLocation && mapRef.current) {
                    initMap();
                }
            }, [userLocation]);

            const initMap = () => {
                const checkL = setInterval(() => {
                    if (typeof L !== 'undefined') {
                        clearInterval(checkL);
                        createMap();
                    }
                }, 100);
            };

            const createMap = () => {
                if (mapRef.current && !mapRef.current._leaflet_id) {
                    const map = L.map(mapRef.current, {
                        center: [userLocation.lat, userLocation.lng],
                        zoom: 13,
                        zoomControl: true,
                        scrollWheelZoom: true
                    });
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(map);

                    const userIcon = L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #10b981; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.4);"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    L.marker([userLocation.lat, userLocation.lng], { icon: userIcon })
                        .addTo(map)
                        .bindPopup('<b>Your Location</b>');
                    
                    fetchRealLocations(map);
                }
            };

            const fetchRealLocations = async (map) => {
                const { lat, lng } = userLocation;
                const radius = 10000;
                
                const overpassQuery = `
                    [out:json][timeout:30];
                    (
                        node["amenity"="food_bank"](around:${radius},${lat},${lng});
                        node["shop"="supermarket"](around:${radius},${lat},${lng});
                        node["shop"="convenience"](around:${radius},${lat},${lng});
                        node["amenity"="restaurant"](around:${radius},${lat},${lng});
                        node["amenity"="fast_food"](around:${radius},${lat},${lng});
                        way["amenity"="food_bank"](around:${radius},${lat},${lng});
                        way["shop"="supermarket"](around:${radius},${lat},${lng});
                        way["shop"="convenience"](around:${radius},${lat},${lng});
                    );
                    out center 50;
                `;

                try {
                    const response = await fetch('https://overpass-api.de/api/interpreter', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: `data=${encodeURIComponent(overpassQuery)}`
                    });
                    
                    if (!response.ok) throw new Error('API error');
                    
                    const data = await response.json();
                    
                    if (data.elements && data.elements.length > 0) {
                        const processedLocations = data.elements.map((el) => {
                            const center = el.center || { lat: el.lat, lon: el.lon };
                            const tags = el.tags || {};
                            const name = tags.name || tags.shop || tags.amenity || 'Local Resource';
                            
                            let type = 'bank';
                            if (tags.shop === 'supermarket' || tags.shop === 'convenience' || tags.shop === 'farm') {
                                type = 'market';
                            } else if (tags.amenity === 'restaurant' || tags.amenity === 'fast_food') {
                                type = 'kitchen';
                            }

                            return {
                                id: el.id,
                                name: name,
                                type: type,
                                lat: center.lat,
                                lng: center.lon,
                                address: tags['addr:street'] ? `${tags['addr:housenumber'] || ''} ${tags['addr:street']}` : '',
                                hours: tags.opening_hours || '',
                                phone: tags.phone || ''
                            };
                        });

                        setLocations(processedLocations);
                        updateMarkersOnMap(processedLocations, map);
                    } else {
                        setLocations([]);
                    }
                } catch (error) {
                    console.error('Error fetching locations:', error);
                } finally {
                    setLoading(false);
                }
            };

            const updateMarkersOnMap = (locs, map) => {
                if (!map) return;
                
                markersRef.current.forEach(marker => {
                    if (map.hasLayer(marker)) {
                        map.removeLayer(marker);
                    }
                });
                markersRef.current = [];

                const filtered = locs.filter(l => activeFilter === 'all' || l.type === activeFilter);

                const icons = {
                    bank: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #10b981; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: bold;">F</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    }),
                    market: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #f59e0b; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: bold;">M</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    }),
                    kitchen: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="background: #8b5cf6; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: bold;">R</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    })
                };

                filtered.forEach(loc => {
                    const marker = L.marker([loc.lat, loc.lng], { icon: icons[loc.type] })
                        .addTo(map)
                        .bindPopup(`<b>${loc.name}</b><br/>${loc.address || 'Address unavailable'}`);
                    markersRef.current.push(marker);
                });
            };

            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 3959;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return (R * c).toFixed(1);
            };

            const filteredLocations = locations.filter(l => {
                const matchesFilter = activeFilter === 'all' || l.type === activeFilter;
                const matchesSearch = !searchQuery || 
                    l.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (l.address && l.address.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesFilter && matchesSearch;
            });

                                    </div>
                                ))}
                            </div>
                            <input 
                                type="text" 
                                placeholder="Search locations..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                style={{
                                    padding: '0.5rem 1rem',
                                    background: 'var(--bg-card)',
                                    border: '1px solid var(--border)',
                                    borderRadius: '20px',
                                    color: 'white',
                                    fontSize: '0.875rem',
                                    outline: 'none',
                                    minWidth: '200px',
                                    marginLeft: 'auto'
                                }}
                            />
                        </div>
                        {loading ? (
                            <div className="location-permission">
                                <div className="spinner"></div>
                                <p style={{marginTop: '1rem'}}>Finding nearby food resources...</p>
                                <p style={{fontSize: '0.8rem', marginTop: '0.5rem'}}>Using your location to search OpenStreetMap</p>
                            </div>
                        ) : (
                            <div className="map-wrapper">
                                <div id="map" ref={mapRef}></div>
                            </div>
                        )}
                    </div>

                    <div style={{marginTop: '2rem'}}>
                        <p style={{textAlign: 'center', color: 'var(--text-secondary)', marginBottom: '1rem'}}>
                            Found {filteredLocations.length} locations near you
                        </p>
                        <div className="map-grid">
                            {displayedLocations.map((location, i) => (
                                <div className="location-card" key={location.id || i}>
                                    <div className={`location-icon ${location.type}`}>
                                        {location.type === 'bank' && (
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                                <path d="M9 22V12h6v10"/>
                                            </svg>
                                        )}
                                        {location.type === 'market' && (
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                                <path d="M3 6h18"/>
                                                <path d="M16 10a4 4 0 0 1-8 0"/>
                                            </svg>
                                        )}

                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                                <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                                                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                                                <path d="M6 1v3"/>

                                                <path d="M14 1v3"/>
                                            </svg>

                                    </div>
                                    <div className="location-info">
                                        <h4>{location.name}</h4>
                                        <p>{location.address || 'Address not available'}</p>
                                        {location.hours && <p>Hours: {location.hours}</p>}
                                        {location.phone && <p>Phone: {location.phone}</p>}
                                        <div className="location-distance">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">

                                        </div>
                                    </div>
                                </div>
                            ))}

                            </div>

                            </p>

                    </div>
