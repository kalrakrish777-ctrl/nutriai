<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - AI Nutrition Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #f59e0b;
            --accent: #8b5cf6;
            --danger: #ef4444;
            --bg-dark: #0f0f1a;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        #three-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app-container {
            position: relative;
            z-index: 1;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 6rem 2rem 4rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--primary);
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease;
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .hero h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(16, 185, 129, 0.5);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: white;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--primary);
        }

        .stats {
            display: flex;
            gap: 3rem;
            margin-top: 4rem;
            animation: fadeInUp 0.6s ease 0.8s both;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .section {
            padding: 5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .section-header p {
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .card-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .card-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--secondary); }
        .card-icon.purple { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
        .card-icon.red { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .card-icon svg {
            width: 28px;
            height: 28px;
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .assessment-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .assessment-form {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section h3 {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .radio-option {
            padding: 0.75rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .radio-option:hover {
            border-color: var(--primary);
        }

        .radio-option.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
        }

        .result-container {
            margin-top: 2rem;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .risk-level {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .risk-low { color: var(--primary); }
        .risk-moderate { color: var(--secondary); }
        .risk-high { color: var(--danger); }

        .progress-ring {
            display: flex;
            justify-content: center;
            margin: 2rem 0;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 12;
        }

        .progress-bg {
            stroke: var(--bg-card);
        }

        .progress-fill {
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .risk-factors {
            margin-top: 1.5rem;
        }

        .risk-factor {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .risk-factor:last-child {
            border-bottom: none;
        }

        .factor-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .factor-icon.positive { background: rgba(16, 185, 129, 0.2); color: var(--primary); }
        .factor-icon.negative { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .recommendations {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .recommendations h4 {
            color: var(--primary);
            margin-bottom: 0.75rem;
        }

        .recommendations ul {
            list-style: none;
        }

        .recommendations li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
        }

        .recommendations li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .location-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .meals-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .meal-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .meal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .meal-image {
            height: 180px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .meal-image::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        .meal-image svg {
            width: 64px;
            height: 64px;
            opacity: 0.9;
        }

        .meal-content {
            padding: 1.5rem;
        }

        .meal-tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .meal-tag {
            padding: 0.25rem 0.75rem;
            background: var(--bg-card);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .meal-tag.protein { color: var(--danger); }
        .meal-tag.vitamins { color: var(--primary); }
        .meal-tag.budget { color: var(--secondary); }

        .meal-content h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .meal-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .meal-macros {
            display: flex;
            gap: 1rem;
        }

        .macro {
            text-align: center;
        }

        .macro-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--primary);
        }

        .macro-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .exchange-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .exchange-form {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .exchange-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .exchange-item:hover {
            border-color: var(--primary);
        }

        .exchange-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .exchange-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .exchange-details h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .exchange-details p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .exchange-distance {
            font-size: 0.85rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .contact-btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .contact-btn:hover {
            background: var(--primary-dark);
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .glow {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .stats {
                flex-direction: column;
                gap: 1.5rem;
            }

            .assessment-form {
                padding: 1.5rem;
            }

            .navbar {
                padding: 0.75rem 1rem;
                overflow-x: auto;
            }

            .navbar button {
                padding: 0.5rem 0.75rem !important;
                font-size: 0.85rem !important;
            }

            .navbar button svg {
                width: 18px !important;
                height: 18px !important;
            }
        }

        @media (min-width: 769px) {
            .tab-label {
                display: inline !important;
            }
            .tab-label-only {
                display: none !important;
            }
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recipe-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .recipe-content {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .recipe-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .recipe-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .recipe-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .close-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .recipe-body {
            padding: 2rem;
        }

        .recipe-section {
            margin-bottom: 1.5rem;
        }

        .recipe-section h3 {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .recipe-section ul {
            list-style: none;
        }

        .recipe-section li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .recipe-section li:last-child {
            border-bottom: none;
        }

        .recipe-section li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--primary);
        }

        .recipe-steps {
            counter-reset: step;
        }

        .recipe-steps li {
            padding-left: 2.5rem;
        }

        .recipe-steps li::before {
            content: counter(step);
            counter-increment: step;
            position: absolute;
            left: 0;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .recipe-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .recipe-meta-item {
            background: var(--bg-card);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        .recipe-meta-item .value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .recipe-meta-item .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .search-no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .search-no-results svg {
            width: 64px;
            height: 64px;
            opacity: 0.5;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div id="three-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const threeScript = document.createElement('script');
        threeScript.innerHTML = `
            (function() {
                const container = document.getElementById('three-bg');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                const geometry = new THREE.TorusKnotGeometry(2, 0.5, 128, 32);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x10b981,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const torusKnot = new THREE.Mesh(geometry, material);
                scene.add(torusKnot);

                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 2000;
                const posArray = new Float32Array(particlesCount * 3);
                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 20;
                }
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0xf59e0b,
                    transparent: true,
                    opacity: 0.8
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                camera.position.z = 6;

                let mouseX = 0;
                let mouseY = 0;
                document.addEventListener('mousemove', (e) => {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                });

                function animate() {
                    requestAnimationFrame(animate);
                    torusKnot.rotation.x += 0.002;
                    torusKnot.rotation.y += 0.003;
                    particlesMesh.rotation.y += 0.0005;
                    
                    camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
                    camera.position.y += (mouseY * 0.5 - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                    
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            })();
        `;

        function BMICalculator() {
            const [height, setHeight] = useState('');
            const [weight, setWeight] = useState('');
            const [unit, setUnit] = useState('metric');
            const [bmi, setBmi] = useState(null);
            const [category, setCategory] = useState('');
            const [color, setColor] = useState('');

            const calculateBMI = () => {
                let heightM, weightKg;
                
                if (unit === 'metric') {
                    heightM = parseFloat(height) / 100;
                    weightKg = parseFloat(weight);
                } else {
                    heightM = (parseFloat(height) * 0.0254);
                    weightKg = parseFloat(weight) * 0.453592;
                }
                
                if (heightM > 0 && weightKg > 0) {
                    const bmiValue = weightKg / (heightM * heightM);
                    setBmi(bmiValue.toFixed(1));
                    
                    if (bmiValue < 18.5) {
                        setCategory('Underweight');
                        setColor('#3b82f6');
                    } else if (bmiValue < 25) {
                        setCategory('Healthy Weight');
                        setColor('#10b981');
                    } else if (bmiValue < 30) {
                        setCategory('Overweight');
                        setColor('#f59e0b');
                    } else {
                        setCategory('Obese');
                        setColor('#ef4444');
                    }
                }
            };

            const getRecommendations = () => {
                if (!bmi) return [];
                
                if (parseFloat(bmi) < 18.5) {
                    return [
                        'Focus on nutrient-dense foods like nuts, avocados, and whole grains',
                        'Eat more frequent, smaller meals throughout the day',
                        'Include protein with every meal to support muscle growth',
                        'Consider consulting a healthcare provider for personalized advice'
                    ];
                } else if (parseFloat(bmi) >= 25) {
                    return [
                        'Focus on portion control and mindful eating',
                        'Increase intake of vegetables and lean proteins',
                        'Limit processed foods and added sugars',
                        'Incorporate regular physical activity'
                    ];
                } else {
                    return [
                        'Maintain your current balanced diet',
                        'Continue regular physical activity',
                        'Focus on whole foods and vegetables',
                        'Stay hydrated and get adequate sleep'
                    ];
                }
            };

            return (
                <section className="section" id="bmi">
                    <div className="section-header">
                        <h2>BMI <span style={{color: 'var(--primary)'}}>Calculator</span></h2>
                        <p>Calculate your Body Mass Index and get personalized health recommendations</p>

                                    <label>Unit System</label>

                                            onClick={() => setUnit('imperial')}
                                        >
                                            Imperial (lbs/in)
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="form-group">
                                    <label>Height ({unit === 'metric' ? 'centimeters' : 'inches'})</label>
                                    <input 
                                        type="number" 
                                        placeholder={unit === 'metric' ? 'e.g., 170' : 'e.g., 67'}
                                        value={height}
                                        onChange={(e) => setHeight(e.target.value)}
                                        style={{
                                            width: '100%',
                                            padding: '0.875rem',
                                            background: 'var(--bg-glass)',
                                            border: '1px solid var(--border)',
                                            borderRadius: '10px',
                                            color: 'white',
